<script>
    let n = prompt("enter a number to grade: ");
    switch(true){
        case (n>=90):
            alert("O");
            break;
        case (n>=80 && n<90):
            alert("A+");
            break;
        case (n>=70 && n<80):
            alert("A");
            break;
        case (n>=60 && n<70):
            alert("B");
            break;
        default:
            alert("Fail!!");
    }
</script>
