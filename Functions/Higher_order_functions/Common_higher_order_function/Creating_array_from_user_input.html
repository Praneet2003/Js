<script>
let n = prompt("enter a number: ");
let arr = [];
for(let i=0;i<n;i++){
    arr[i] = Number(prompt(`Enter array element for index ${i}: `));
}
let sum = arr.reduce((res,val)=>{
    return res+val;
},0);
console.log(sum);
let product = arr.reduce((res,val)=>{
    return res*val;
},1);
console.log(product);
</script>
